name: Testes

on:
  pull_request:
    branches:
      - "**"

jobs:
  test:
    name: Executar testes
    runs-on: ubuntu-latest

    env:
      # Todos os testes mockam @/lib/db — nenhuma conexão real é feita.
      # DATABASE_URL precisa existir para o prisma generate (via postinstall).
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@localhost:5432/ci' }}
      GEMINI_API_KEY: "test-placeholder"

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências (inclui prisma generate via postinstall)
        run: npm ci

      - name: Executar testes
        run: npm run test:run
